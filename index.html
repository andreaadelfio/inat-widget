<!doctype html>
<html lang="en">
  <head>
    <meta charset="utf-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <link rel="stylesheet" href="./inat-widget-custom.css">
    <title>iNaturalist Widget | Andrea Adelfio</title>
  </head>
  <body>
    <div
      data-inat-widget
      data-inat-title="View my observations"
      data-inat-limit="15"
      data-inat-tile-size="xs"
      data-inat-cols-mode="fixed"
      data-inat-cols="5"
      data-inat-rows-mode="auto"
      data-inat-source="andreaadelfio"
      data-inat-show-stats="true"
      data-inat-cache="true">
    </div>

    <div
      data-inat-widget
      data-inat-title="View my observations"
      data-inat-source="andreaadelfio"
      data-inat-source-type="user"
      data-inat-tile-size="s"
      data-inat-cols-mode="fixed"
      data-inat-cols="7"
      data-inat-limit="21"
      data-inat-theme="light"
      data-inat-order-by="observed_on"
      data-inat-order="desc"
      data-inat-radius="14"
      data-inat-padding="14"
      data-inat-show-title="true"
      data-inat-cache="false"
    ></div>
    <script src="./inat-widget-custom.js"></script>
  </body>
</html>
