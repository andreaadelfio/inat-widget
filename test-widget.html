<!doctype html>
<html lang="it">
<head>
  <meta charset="utf-8">
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>iNat Widget Playground</title>
  <style>
    *{ box-sizing:border-box; }
    body{
      margin:0;
      font-family:system-ui,-apple-system,Segoe UI,Roboto,sans-serif;
      background:#f3f6fb;
      color:#1f2937;
    }
    .page{
      max-width:1320px;
      margin:0 auto;
      padding:18px;
      display:grid;
      gap:14px;
      grid-template-columns:340px 1fr;
    }
    .panel{
      background:#fff;
      border:1px solid #dbe3ea;
      border-radius:12px;
      padding:14px;
    }
    h1{
      margin:0 0 8px;
      font-size:20px;
      line-height:1.2;
    }
    p{
      margin:0 0 12px;
      font-size:14px;
      color:#526075;
    }
    .controls{ display:grid; gap:10px; }
    .row{ display:grid; gap:6px; }
    .row-2{ display:grid; gap:8px; grid-template-columns:1fr 1fr; }
    label{ font-size:13px; font-weight:600; }
    input,select{
      width:100%;
      height:34px;
      border:1px solid #c9d3df;
      border-radius:8px;
      padding:0 10px;
      font-size:14px;
      background:#fff;
      color:#111827;
    }
    .check{
      display:flex;
      align-items:center;
      gap:8px;
      font-size:13px;
    }
    .check input{
      width:auto;
      height:auto;
      margin:0;
      padding:0;
    }
    .actions{ display:flex; gap:8px; }
    button{
      height:34px;
      border:1px solid #c8d3e0;
      border-radius:8px;
      background:#f8fafc;
      color:#1f2937;
      font-size:13px;
      font-weight:600;
      padding:0 12px;
      cursor:pointer;
    }
    button.primary{
      background:#0284c7;
      border-color:#0369a1;
      color:#fff;
    }
    .preview-head{
      display:flex;
      flex-wrap:wrap;
      align-items:center;
      gap:8px;
      margin-bottom:10px;
    }
    .sizes{ display:flex; gap:6px; }
    .sizes button{ height:30px; font-size:12px; }
    .range{
      margin-left:auto;
      display:flex;
      align-items:center;
      gap:8px;
      min-width:260px;
    }
    .range input{ height:auto; padding:0; }
    #widthValue{ min-width:58px; font-size:12px; color:#526075; text-align:right; }
    .frame-wrap{
      border:1px solid #d8e2ed;
      border-radius:10px;
      background:#eaf0f7;
      padding:10px;
      overflow:auto;
      min-height:620px;
    }
    iframe{
      display:block;
      width:100%;
      min-width:280px;
      height:640px;
      border:1px dashed #b8c8dc;
      border-radius:10px;
      background:#fff;
      margin:0 auto;
    }
    pre{
      margin:10px 0 0;
      padding:10px;
      border-radius:10px;
      background:#0b1220;
      color:#e2e8f0;
      font-size:12px;
      line-height:1.45;
      white-space:pre-wrap;
      max-height:220px;
      overflow:auto;
    }
    @media(max-width:1024px){
      .page{ grid-template-columns:1fr; }
      .range{ margin-left:0; }
    }
  </style>
</head>
<body>
  <div class="page">
    <section class="panel">
      <h1>Widget Playground</h1>
      <form id="controls" class="controls">
        <div class="row">
          <label for="source">Source</label>
          <input id="source" name="source" value="andreaadelfio" required>
        </div>

        <div class="row">
          <label for="sourceType">Source Type</label>
          <select id="sourceType" name="sourceType">
            <option value="user">user</option>
            <option value="project">project</option>
            <option value="place">place</option>
            <option value="taxon">taxon</option>
            <option value="observation">observation</option>
          </select>
        </div>

        <div class="row-2">
          <div class="row">
            <label for="photoSize">Tile Size</label>
            <select id="photoSize" name="photoSize">
              <option value="a" selected>a (auto)</option>
              <option value="xs">xs</option>
              <option value="s">s</option>
              <option value="m">m</option>
              <option value="l">l</option>
            </select>
          </div>
          <div class="row">
            <label for="limit">Limit</label>
            <input id="limit" name="limit" type="number" min="1" max="50" value="10">
          </div>
        </div>

        <div class="row-2">
          <div class="row">
            <label for="colsMode">Columns</label>
            <div class="row-2">
              <select id="colsMode" name="colsMode">
                <option value="auto" selected>auto</option>
                <option value="fixed">fixed</option>
              </select>
              <input id="cols" name="cols" type="number" min="1" max="24" value="4">
            </div>
          </div>
          <div class="row">
            <label for="rowsMode">Rows</label>
            <div class="row-2">
              <select id="rowsMode" name="rowsMode">
                <option value="auto" selected>auto</option>
                <option value="fixed">fixed</option>
              </select>
              <input id="rows" name="rows" type="number" min="1" max="24" value="2">
            </div>
          </div>
        </div>

        <div class="row-2">
          <div class="row">
            <label for="theme">Theme</label>
            <select id="theme" name="theme">
              <option value="light">light</option>
              <option value="dark">dark</option>
              <option value="transparent-light">transparent-light</option>
              <option value="transparent-dark">transparent-dark</option>
            </select>
          </div>
          <div class="row">
            <label for="title">Title</label>
            <input id="title" name="title" value="View my observations on">
          </div>
        </div>

        <div class="row-2">
          <div class="row">
            <label for="orderBy">Order By</label>
            <input id="orderBy" name="orderBy" value="observed_on">
          </div>
          <div class="row">
            <label for="order">Order</label>
            <select id="order" name="order">
              <option value="desc" selected>desc</option>
              <option value="asc">asc</option>
            </select>
          </div>
        </div>

        <div class="row-2">
          <div class="row">
            <label for="radius">Radius</label>
            <input id="radius" name="radius" type="number" min="0" max="50" value="14">
          </div>
          <div class="row">
            <label for="padding">Padding</label>
            <input id="padding" name="padding" type="number" min="0" max="50" value="14">
          </div>
        </div>

        <div class="row-2">
          <label class="check">
            <input id="showTitle" name="showTitle" type="checkbox" checked>
            show title
          </label>
          <label class="check">
            <input id="showStats" name="showStats" type="checkbox">
            show stats
          </label>
        </div>

        <div class="row-2">
          <label class="check">
            <input id="useCache" name="useCache" type="checkbox" checked>
            use cache
          </label>
        </div>

        <div class="actions">
          <button class="primary" type="submit">Aggiorna</button>
          <button id="reset" type="button">Reset</button>
        </div>
      </form>
    </section>

    <section class="panel">
      <div class="preview-head">
        <div class="sizes">
          <button type="button" data-width="390">Mobile 390</button>
          <button type="button" data-width="768">Tablet 768</button>
          <button type="button" data-width="1200">Laptop 1200</button>
          <button type="button" data-width="1600">Wide 1600</button>
        </div>
        <div class="range">
          <label for="widthRange">Larghezza</label>
          <input id="widthRange" type="range" min="300" max="1600" value="1200">
          <span id="widthValue">1200px</span>
        </div>
      </div>

      <div class="frame-wrap">
        <iframe id="preview" title="preview widget"></iframe>
      </div>

      <pre id="snippet"></pre>
    </section>
  </div>

  <script>
    (function(){
      'use strict';

      const defaults = {
        source: 'andreaadelfio',
        sourceType: 'user',
        photoSize: 'a',
        colsMode: 'auto',
        cols: '4',
        rowsMode: 'auto',
        rows: '2',
        limit: '10',
        theme: 'light',
        title: 'View my observations on',
        orderBy: 'observed_on',
        order: 'desc',
        radius: '14',
        padding: '14',
        showTitle: true,
        showStats: false,
        useCache: true
      };

      const form = document.getElementById('controls');
      const preview = document.getElementById('preview');
      const snippet = document.getElementById('snippet');
      const widthRange = document.getElementById('widthRange');
      const widthValue = document.getElementById('widthValue');
      const resetButton = document.getElementById('reset');
      const widthButtons = Array.from(document.querySelectorAll('button[data-width]'));

      function escapeAttr(value){
        return String(value)
          .replace(/&/g, '&amp;')
          .replace(/"/g, '&quot;')
          .replace(/</g, '&lt;')
          .replace(/>/g, '&gt;');
      }

      function setForm(values){
        form.source.value = values.source;
        form.sourceType.value = values.sourceType;
        form.photoSize.value = values.photoSize;
        form.colsMode.value = values.colsMode;
        form.cols.value = values.cols;
        form.rowsMode.value = values.rowsMode;
        form.rows.value = values.rows;
        form.limit.value = values.limit;
        form.theme.value = values.theme;
        form.title.value = values.title;
        form.orderBy.value = values.orderBy;
        form.order.value = values.order;
        form.radius.value = values.radius;
        form.padding.value = values.padding;
        form.showTitle.checked = values.showTitle;
        form.showStats.checked = values.showStats;
        form.useCache.checked = values.useCache;
      }

      function getForm(){
        return {
          source: form.source.value.trim(),
          sourceType: form.sourceType.value.trim(),
          photoSize: form.photoSize.value.trim(),
          colsMode: form.colsMode.value.trim(),
          cols: form.cols.value.trim(),
          rowsMode: form.rowsMode.value.trim(),
          rows: form.rows.value.trim(),
          limit: form.limit.value.trim(),
          theme: form.theme.value.trim(),
          title: form.title.value.trim(),
          orderBy: form.orderBy.value.trim(),
          order: form.order.value.trim(),
          radius: form.radius.value.trim(),
          padding: form.padding.value.trim(),
          showTitle: form.showTitle.checked,
          showStats: form.showStats.checked,
          useCache: form.useCache.checked
        };
      }

      function buildWidgetHtml(opts){
        return [
          '<div',
          '  data-inat-widget',
          `  data-inat-source="${escapeAttr(opts.source)}"`,
          `  data-inat-source-type="${escapeAttr(opts.sourceType)}"`,
          `  data-inat-tile-size="${escapeAttr(opts.photoSize)}"`,
          `  data-inat-photo-size="${escapeAttr(opts.photoSize)}"`,
          `  data-inat-cols-mode="${escapeAttr(opts.colsMode)}"`,
          `  data-inat-cols="${escapeAttr(opts.cols)}"`,
          `  data-inat-rows-mode="${escapeAttr(opts.rowsMode)}"`,
          `  data-inat-rows="${escapeAttr(opts.rows)}"`,
          `  data-inat-limit="${escapeAttr(opts.limit)}"`,
          `  data-inat-theme="${escapeAttr(opts.theme)}"`,
          `  data-inat-title="${escapeAttr(opts.title)}"`,
          `  data-inat-order-by="${escapeAttr(opts.orderBy)}"`,
          `  data-inat-order="${escapeAttr(opts.order)}"`,
          `  data-inat-radius="${escapeAttr(opts.radius)}"`,
          `  data-inat-padding="${escapeAttr(opts.padding)}"`,
          `  data-inat-show-title="${opts.showTitle}"`,
          `  data-inat-show-stats="${opts.showStats}"`,
          `  data-inat-cache="${opts.useCache}"`,
          '></div>'
        ].join('\n');
      }

      function buildSrcdoc(opts){
        const baseHref = escapeAttr(window.location.href);
        const widget = buildWidgetHtml(opts);
        return [
          '<!doctype html>',
          '<html lang="it"><head>',
          '<meta charset="utf-8">',
          '<meta name="viewport" content="width=device-width, initial-scale=1">',
          `<base href="${baseHref}">`,
          '<link rel="stylesheet" href="./inat-widget-custom.css">',
          '<style>html,body{margin:0;padding:0;background:#e8eef6;}main{padding:16px;}</style>',
          '</head><body><main>',
          widget,
          '</main>',
          '<script src="./inat-widget-custom.js"><\/script>',
          '</body></html>'
        ].join('');
      }

      function setPreviewWidth(value){
        const px = Math.max(300, Math.min(1600, Number(value) || 1200));
        preview.style.width = `${px}px`;
        widthRange.value = String(px);
        widthValue.textContent = `${px}px`;
      }

      function render(){
        const opts = getForm();
        preview.srcdoc = buildSrcdoc(opts);
        snippet.textContent = buildWidgetHtml(opts);
      }

      function updateGridControlsState(){
        form.cols.disabled = form.colsMode.value !== 'fixed';
        form.rows.disabled = form.rowsMode.value !== 'fixed';
      }

      form.addEventListener('submit', (event) => {
        event.preventDefault();
        render();
      });

      resetButton.addEventListener('click', () => {
        setForm(defaults);
        updateGridControlsState();
        render();
      });

      form.colsMode.addEventListener('change', updateGridControlsState);
      form.rowsMode.addEventListener('change', updateGridControlsState);

      widthRange.addEventListener('input', () => {
        setPreviewWidth(widthRange.value);
      });

      widthButtons.forEach((button) => {
        button.addEventListener('click', () => {
          setPreviewWidth(button.dataset.width);
        });
      });

      setForm(defaults);
      updateGridControlsState();
      setPreviewWidth(1200);
      render();
    })();
  </script>
</body>
</html>
